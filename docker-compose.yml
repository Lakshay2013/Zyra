version: "3.8"

services:
  # ── MongoDB ──
  ai-shield-mongo:
    image: mongo:7
    container_name: zyra-mongodb
    ports:
      - "27018:27017"
    volumes:
      - zyra_mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  ai-shield-redis:
    image: redis:7-alpine
    container_name: zyra-redis
    ports:
      - "6380:6379"
    volumes:
      - zyra_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  zyra-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zyra-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://ai-shield-mongo:27017/ai-shield
      - REDIS_HOST=ai-shield-redis
      - REDIS_PORT=6379
    depends_on:
      ai-shield-mongo:
        condition: service_healthy
      ai-shield-redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  zyra_mongo_data:
  zyra_redis_data:
